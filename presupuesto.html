<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuesto - AlphaBraz</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- MENU -->
    <nav>

        <div class="logo-nav">
            AlphaBraz
        </div>

        <a href="index.html">Início</a>
        <a href="servicos.html">Serviços</a>
        <a href="presupuesto.html">Presupuesto</a>
        <a href="sobre.html">Sobre</a>
        <a href="contatos.html">Contatos</a>

    </nav>

    <!-- BANNER -->
    <header></header>

    <!-- CONTEÚDO -->
    <main>

        <div class="container">

            <h1>Solicite seu Presupuesto</h1>

            <p>
                Preencha o formulário abaixo e entraremos em contato o mais breve possível.
            </p>

            <form action="#" method="post">

                <input
                    type="text"
                    placeholder="Nome completo"
                    required
                >

                <input
                    type="email"
                    placeholder="E-mail"
                    required
                >

                <input
                    type="tel"
                    placeholder="Telefone"
                >

                <textarea
                    placeholder="Descreva seu projeto..."
                    required
                ></textarea>

                <button type="submit">
                    Enviar Pedido
                </button>

            </form>

        </div>

    </main>

    <!-- RODAPÉ -->
    <footer>
        © 2026 AlphaBraz - Todos os direitos reservados.
    </footer>

</body>

</html>
