<div class="container">

    <h1>Solicite seu Orçamento</h1>

    <p>
        Preencha o formulário abaixo e responderemos o mais rápido possível.
    </p>

    <form>

        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seuemail@email.com" required>

        <label for="telefone">Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="+34 600 000 000" required>

        <label for="servico">Serviço</label>

        <select id="servico">

            <option>Selecione um serviço</option>
            <option>Reformas residenciais</option>
            <option>Reformas comerciais</option>
            <option>Pintura interior e exterior</option>
            <option>Remodelações</option>
            <option>Trabalhos verticais</option>
            <option>Impermeabilização</option>
            <option>Acabamentos</option>

        </select>

        <label for="mensagem">Descreva seu projeto</label>

        <textarea
            id="mensagem"
            rows="6"
            placeholder="Conte um pouco sobre o serviço desejado..."
        ></textarea>

        <button type="submit">Solicitar orçamento</button>

    </form>

</div>
