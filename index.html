<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Reformas AlphaBraz</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
}

/* MENU */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #111;
  padding: 15px;
  text-align: center;
  z-index: 1000;
}

header h1 {
  color: white;
  font-family: Georgia, serif;
  margin-bottom: 10px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  cursor: pointer;
  font-weight: bold;
}

nav a:hover {
  color: gold;
}

/* CONTAINER DAS SEÇÕES */
.container {
  display: flex;
  width: 500vw; /* 5 telas */
  height: 100vh;
  transition: transform 0.6s ease-in-out;
}

/* CADA TELA */
section {
  width: 100vw;
  height: 100vh;
  padding-top: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* CORES DIFERENTES */
#inicio { background: #f2f2f2; }
#servicos { background: #ddd; }
#orcamento { background: #ccc; }
#sobre { background: #bbb; }
#contatos { background: #aaa; }

/* BOTÃO WHATSAPP */
.whatsapp {
  margin-top: 15px;
  background: #25D366;
  color: white;
  padding: 10px 15px;
  border-radius: 5px;
  text-decoration: none;
}

/* FORM */
input, textarea {
  margin: 5px;
  padding: 10px;
  width: 250px;
}

button {
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

</style>
</head>

<body>

<header>
  <h1>Reformas AlphaBraz</h1>
  <nav>
    <a onclick="goTo(0)">Início</a>
    <a onclick="goTo(1)">Serviços</a>
    <a onclick="goTo(2)">Orçamento</a>
    <a onclick="goTo(3)">Sobre</a>
    <a onclick="goTo(4)">Contatos</a>
  </nav>
</header>

<!-- SLIDES -->
<div class="container" id="slider">

  <section id="inicio">
    <h2>Bem-vindo à AlphaBraz</h2>
    <p>Especialistas em reformas e construção</p>
  </section>

  <section id="servicos">
    <h2>Serviços</h2>
    <p>Reformas, pintura, eletricidade, canalização</p>
  </section>

  <section id="orcamento">
    <h2>Orçamento</h2>
    <input type="text" placeholder="Nome">
    <input type="email" placeholder="Email">
    <textarea placeholder="Projeto"></textarea>
    <button>Enviar</button>
  </section>

  <section id="sobre">
    <h2>Sobre Nós</h2>
    <p>Empresa confiável com anos de experiência</p>
  </section>

  <section id="contatos">
    <h2>Contatos</h2>
    <p>Telefone: +34 600 000 000</p>

    <a class="whatsapp" href="https://wa.me/34600000000" target="_blank">
      WhatsApp
    </a>
  </section>

</div>

<script>
let slider = document.getElementById("slider");

function goTo(index) {
  slider.style.transform = "translateX(-" + (index * 100) + "vw)";
}
</script>

</body>
</html>
